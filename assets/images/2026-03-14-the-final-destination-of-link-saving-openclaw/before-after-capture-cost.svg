<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">이전 방식과 지금 방식의 저장 비용 비교</title>
  <desc id="desc">이전 저장 방식과 URL 기반 저장 방식의 단계 수 차이를 비교한 before after 이미지</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panelOld { fill: #fef2f2; stroke: #dc2626; stroke-width: 3; rx: 24; ry: 24; }
      .panelNew { fill: #ecfdf5; stroke: #059669; stroke-width: 3; rx: 24; ry: 24; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #111827; }
      .head { font: 700 24px 'Pretendard', 'Noto Sans KR', sans-serif; }
      .old { fill: #b91c1c; }
      .new { fill: #047857; }
      .body { font: 500 20px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #374151; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="500"/>
  <text x="60" y="60" class="title">저장 비용 비교</text>

  <rect x="60" y="100" width="500" height="340" class="panelOld"/>
  <text x="90" y="145" class="head old">이전 방식</text>
  <text x="90" y="195" class="body">1. 앱 열기</text>
  <text x="90" y="235" class="body">2. 제목 정하기</text>
  <text x="90" y="275" class="body">3. 폴더/태그 고민</text>
  <text x="90" y="315" class="body">4. 메모 남길지 결정</text>
  <text x="90" y="355" class="body">5. 저장</text>
  <text x="90" y="405" class="body">단계가 많아질수록 저장 자체가 미뤄진다</text>

  <rect x="640" y="100" width="500" height="340" class="panelNew"/>
  <text x="670" y="145" class="head new">지금 방식</text>
  <text x="670" y="215" class="body">1. URL 보내기</text>
  <text x="670" y="255" class="body">2. 자동 저장 완료</text>
  <text x="670" y="325" class="body">저장 비용이 거의 없어서</text>
  <text x="670" y="365" class="body">귀찮은 날에도 계속 남길 수 있다</text>
</svg>
